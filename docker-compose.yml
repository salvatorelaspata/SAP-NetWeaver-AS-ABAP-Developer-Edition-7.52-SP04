services:
  sap-abap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sap-abap-752
    hostname: vhcalnplci
    privileged: true
    stdin_open: true
    tty: true
    ports:
      - "8000:8000"   # HTTP
      - "44300:44300" # HTTPS
      - "3300:3300"   # ABAP in Eclipse
      - "3200:3200"   # SAP GUI
      - "8443:8443"   # SAP Cloud Connector
    volumes:
      - sap-data:/sybase/NPL
      - sap-usr:/usr/sap
    restart: unless-stopped

volumes:
  sap-data:
    driver: local
  sap-usr:
    driver: local
